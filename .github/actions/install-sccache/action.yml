name: Install sccache
description: Download the sccache binary, add it to PATH, and enable a restored local cache store.
inputs:
  version:
    description: sccache release tag.
    required: false
    default: v0.14.0
  cache-size:
    description: Maximum local sccache store size.
    required: false
    default: 2G
runs:
  using: composite
  steps:
    - name: Cache sccache
      id: cache-sccache
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/sccache
        key: sccache-${{ runner.os }}-${{ inputs.version }}
    - name: Install sccache
      if: steps.cache-sccache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail

        archive="sccache-${{ inputs.version }}-x86_64-unknown-linux-musl.tar.gz"
        extracted_dir="$RUNNER_TEMP/sccache-${{ inputs.version }}-x86_64-unknown-linux-musl"

        curl -fsSL "https://github.com/mozilla/sccache/releases/download/${{ inputs.version }}/${archive}" -o "$RUNNER_TEMP/${archive}"
        rm -rf "$extracted_dir"
        tar -xzf "$RUNNER_TEMP/${archive}" -C "$RUNNER_TEMP"

        mkdir -p "$HOME/.local/bin"
        install "$extracted_dir/sccache" "$HOME/.local/bin/sccache"
    - name: Add sccache to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Cache local sccache store
      uses: actions/cache@v5
      with:
        path: ~/.cache/sccache
        key: sccache-store-${{ runner.os }}-${{ inputs.version }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', '**/*.rs', '**/rust-toolchain.toml') }}
        restore-keys: |
          sccache-store-${{ runner.os }}-${{ inputs.version }}-${{ github.job }}-
          sccache-store-${{ runner.os }}-${{ inputs.version }}-
    - name: Enable local sccache
      shell: bash
      run: |
        set -euo pipefail

        {
          echo "SCCACHE_GHA_ENABLED=false"
          echo "SCCACHE_GHA_CACHE_URL="
          echo "SCCACHE_GHA_RUNTIME_TOKEN="
          echo "SCCACHE_DIR=${HOME}/.cache/sccache"
          echo "SCCACHE_CACHE_SIZE=${{ inputs.cache-size }}"
          echo "RUSTC_WRAPPER=sccache"
        } >> "$GITHUB_ENV"

        SCCACHE_GHA_ENABLED=false \
          SCCACHE_GHA_CACHE_URL= \
          SCCACHE_GHA_RUNTIME_TOKEN= \
          SCCACHE_DIR="${HOME}/.cache/sccache" \
          SCCACHE_CACHE_SIZE="${{ inputs.cache-size }}" \
          sccache --start-server

        echo "sccache enabled with restored local storage."
